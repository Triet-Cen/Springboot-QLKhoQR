<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout(~{::title}, ~{::#mainContent})}">
<head>
    <title>Cập nhật người dùng</title>
</head>
<body>
<div id="mainContent">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin/users}">Người dùng</a></li>
            <li class="breadcrumb-item active">Chỉnh sửa</li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3">
            <h5 class="card-title mb-0 fw-bold text-warning">
                <i class="bi bi-pencil-square me-2"></i>Cập nhật thông tin
            </h5>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/admin/users/edit}" th:object="${userRequest}" method="post">
                <input type="hidden" th:field="*{userId}">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Họ và tên</label>
                        <input type="text" class="form-control" th:field="*{fullName}">
                        <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Số điện thoại</label>
                        <input type="text" class="form-control" th:field="*{phone}">
                        <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control" th:field="*{email}">
                        <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Vai trò</label>
                        <select th:field="*{roleId}" class="form-select">
                            <option th:each="r : ${roles}" th:value="${r.roleId}" th:text="${r.roleName}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Mật khẩu mới</label>
                        <input type="password" class="form-control" th:field="*{password}" placeholder="Để trống nếu không muốn đổi">
                        <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-warning px-4">
                        <i class="bi bi-save me-1"></i> Lưu thay đổi
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary px-4">Hủy bỏ</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
