<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ thống Điều hành Kho Thông minh</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --success-color: #22c55e;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --bg-soft: #f8fafc;
        }

        body {
            background-color: var(--bg-soft);
            font-family: "Inter", sans-serif;
        }

        .nav-pills .nav-link {
            border-radius: 12px;
            padding: 12px 24px;
            color: #64748b;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .nav-pills .nav-link.active {
            background: var(--primary-gradient);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .op-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .scanner-viewport {
            position: relative;
            height: 300px;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ĐƯỜNG KẺ QUÉT: Cần z-index cao để nổi trên video */
        .scan-anim {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #fff;
            box-shadow: 0 0 15px #6366f1;
            animation: scanning 2s infinite ease-in-out;
            z-index: 20;
            display: none;
        }

        @keyframes scanning {
            0% {
                top: 10%;
            }
            50% {
                top: 90%;
            }
            100% {
                top: 10%;
            }
        }

        .item-list-container {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .scanned-item {
            border-left: 5px solid var(--success-color);
            transition: all 0.3s ease;
        }

        .qty-input {
            width: 70px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .border-dashed {
            border-style: dashed !important;
        }
        .import-dropzone:hover {
            background-color: #f1f3f5 !important;
            border-color: #4f46e5 !important;
        }

        /* QUAN TRỌNG: Ép video luôn vừa khít khung */
        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
            border-radius: 16px;
            background: black;
        }

        #reader {
            width: 100%;
            height: 300px;
            position: relative;
        }
    </style>
    <script
            type="text/javascript"
            src="https://unpkg.com/@zxing/library@latest"
    ></script>
</head>
<body>
<div class="container-fluid py-4">
    <div class="row mb-4">
        <div class="col-12 text-center">
            <h1
                    class="fw-bold text-dark"
                    style="
              background: var(--primary-gradient);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
            "
            >
                Warehouse Operations Hub
            </h1>
            <p class="text-secondary">
                Số hóa quy trình Nhập - Xuất - Chuyển kho thời gian thực
            </p>
        </div>
    </div>

    <ul
            class="nav nav-pills justify-content-center mb-5 gap-3"
            id="opTab"
            role="tablist"
    >
        <li class="nav-item">
            <button class="nav-link active" onclick="switchMode('INBOUND', this)">
                <i class="bi bi-box-arrow-in-down me-2"></i>NHẬP KHO
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="switchMode('OUTBOUND', this)">
                <i class="bi bi-box-arrow-up me-2"></i>XUẤT KHO
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="switchMode('TRANSFER', this)">
                <i class="bi bi-arrow-left-right me-2"></i>ĐIỀU CHUYỂN
            </button>
        </li>
    </ul>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card op-card h-100 shadow-sm">
                <div class="card-body p-4">
                    <div
                            class="d-flex justify-content-between align-items-center mb-4"
                    >
                        <h5 class="fw-bold mb-0">Trạm Quét Kỹ Thuật Số</h5>
                        <div class="form-check form-switch">
                            <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="cameraSwitch"
                            />
                            <label
                                    class="form-check-label small fw-bold text-muted"
                                    for="cameraSwitch"
                            >CAMERA</label
                            >
                        </div>
                    </div>

                    <div id="reader" class="scanner-viewport mb-4">
                        <video
                                id="video"
                                playsinline
                                style="width: 100%; height: 100%; border-radius: 16px"
                        ></video>

                        <div class="scan-anim" id="scannerLine"></div>

                        <div class="text-center text-white opacity-50" id="placeholder">
                            <i class="bi bi-camera-video-off fs-1"></i>
                            <p class="small mt-2">Camera đang tắt</p>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label
                                class="form-label small fw-bold text-muted text-uppercase mb-2"
                        >Nhập dữ liệu lô hàng lớn</label
                        >
                        <div
                                class="import-dropzone p-4 text-center border-2 border-dashed rounded-4 bg-light position-relative"
                                id="dropzone"
                        >
                            <input
                                    type="file"
                                    id="csvFileInput"
                                    class="position-absolute opacity-0 w-100 h-100 start-0 top-0"
                                    accept=".csv"
                                    style="cursor: pointer"
                            />
                            <div class="py-2">
                                <i
                                        class="bi bi-file-earmark-spreadsheet fs-2 text-success mb-2 d-block"
                                ></i>
                                <h6 class="fw-bold text-dark mb-1">Tải lên file CSV</h6>
                                <p class="text-muted small mb-0 text-primary">
                                    Chọn từ máy tính
                                </p>
                            </div>
                        </div>

                        <div id="fileStatus" class="mt-3 d-none">
                            <div
                                    class="d-flex align-items-center p-2 border rounded-3 bg-white shadow-sm"
                            >
                                <i class="bi bi-file-check-fill text-success fs-4 me-3"></i>
                                <div class="flex-grow-1 overflow-hidden">
                                    <div
                                            class="small fw-bold text-dark text-truncate"
                                            id="fileNameDisplay"
                                    >
                                        filename.csv
                                    </div>
                                </div>
                                <button
                                        type="button"
                                        class="btn btn-link text-danger p-0 ms-2"
                                        onclick="resetFileInput()"
                                >
                                    <i class="bi bi-x-circle-fill"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card op-card h-100 shadow-sm">
                <div
                        class="card-header bg-white border-0 py-4 px-4 d-flex justify-content-between align-items-center"
                >
                    <h5 class="fw-bold mb-0">Danh sách chờ xử lý</h5>
                    <span
                            class="badge bg-light text-dark border px-3 py-2 rounded-pill"
                            id="itemCounter"
                    >0 sản phẩm</span
                    >
                </div>

                <div class="card-body p-0">
                    <div class="item-list-container px-4">
                        <div class="list-group list-group-flush gap-3" id="scannedList">
                            <div class="text-center py-5 opacity-25" id="noData">
                                <i class="bi bi-box-seam display-1"></i>
                                <p class="mt-2">Chưa có dữ liệu quét</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-footer bg-white border-0 p-4">
                    <div class="d-grid gap-2">
                        <button
                                class="btn btn-lg text-white shadow-sm"
                                style="
                    background: var(--primary-gradient);
                    border: none;
                    border-radius: 14px;
                  "
                        >
                            XÁC NHẬN HOÀN TẤT
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const codeReader = new ZXing.BrowserQRCodeReader();
    const cameraSwitch = document.getElementById("cameraSwitch");
    const placeholder = document.getElementById("placeholder");
    const scannerLine = document.getElementById("scannerLine");
    const videoElement = document.getElementById("video");

    let controls = null;

    async function startCamera() {
        try {
            placeholder.style.display = "none";
            scannerLine.style.display = "block";

            // 1. Lấy danh sách thiết bị
            const videoInputDevices = await codeReader.listVideoInputDevices();
            if (videoInputDevices.length === 0) {
                throw new Error("Không tìm thấy camera trên thiết bị này.");
            }

            // 2. Logic chọn camera linh hoạt hơn
            // Mặc định chọn thiết bị đầu tiên (thường là Webcam trên Laptop)
            let selectedDeviceId = videoInputDevices[0].deviceId;

            // Chỉ tìm camera sau nếu thiết bị có nhiều hơn 1 camera (thường là điện thoại)
            if (videoInputDevices.length > 1) {
                const backCamera = videoInputDevices.find(
                    (device) =>
                        device.label.toLowerCase().includes("back") ||
                        device.label.toLowerCase().includes("sau") ||
                        device.label.toLowerCase().includes("environment"),
                );
                if (backCamera) {
                    selectedDeviceId = backCamera.deviceId;
                }
            }

            console.log("Khởi động Camera ID:", selectedDeviceId);

            // 3. Khởi chạy quét
            // Thêm các ràng buộc (constraints) tối giản để tránh lỗi "Could not start video source"
            controls = await codeReader.decodeFromVideoDevice(
                selectedDeviceId,
                videoElement,
                (result, err) => {
                    if (result) {
                        handleScan(result.getText());
                    }
                    // Bỏ qua các lỗi NotFoundException thông thường
                    if (err && err.name !== "NotFoundException") {
                        // Chỉ log các lỗi thực sự nghiêm trọng
                        if (err.name !== "TypeError") console.error(err);
                    }
                },
            );

            // 4. Mẹo: Force render lại để tránh lỗi đen màn hình
            setTimeout(() => {
                window.dispatchEvent(new Event("resize"));
            }, 200);
        } catch (err) {
            console.error("Lỗi chi tiết:", err);

            let errorMsg = "Không thể truy cập Camera.";
            if (err.name === "NotAllowedError")
                errorMsg = "Bạn đã chặn quyền truy cập Camera trên trình duyệt.";
            if (err.message.includes("source"))
                errorMsg =
                    "Camera đang bị ứng dụng khác chiếm dụng (Zalo, Zoom...)";

            alert(
                "Lỗi camera: " +
                errorMsg +
                "\nLưu ý: Đảm bảo đã 'Cho phép' Camera ở thanh địa chỉ.",
            );

            cameraSwitch.checked = false;
            stopCamera();
        }
    }

    function stopCamera() {
        if (controls) {
            controls.stop();
            controls = null;
        }

        // Tắt đèn báo camera và giải phóng phần cứng triệt để
        if (videoElement.srcObject) {
            const tracks = videoElement.srcObject.getTracks();
            tracks.forEach((track) => track.stop());
            videoElement.srcObject = null;
        }

        scannerLine.style.display = "none";
        placeholder.style.display = "block";
    }

    cameraSwitch.addEventListener("change", function () {
        this.checked ? startCamera() : stopCamera();
    });

    // ====== XỬ LÝ SCAN & UI ======
    const beepSound = new Audio(
        "https://actions.google.com/sounds/v1/alarms/beep_short.ogg",
    );
    let lastScan = "";
    let lastTime = 0;

    function handleScan(text) {
        const now = Date.now();
        if (text === lastScan && now - lastTime < 2500) return; // Đợi 2.5s mới cho quét lại cùng 1 mã

        lastScan = text;
        lastTime = now;

        addProductToList(text);

        beepSound.currentTime = 0;
        beepSound.play().catch(() => {});
        if (navigator.vibrate) navigator.vibrate(100);
    }

    function addProductToList(sku) {
        const list = document.getElementById("scannedList");
        const noData = document.getElementById("noData");
        if (noData) noData.style.display = "none";

        const newItem = document.createElement("div");
        newItem.className =
            "list-group-item scanned-item border-0 shadow-sm mb-2 rounded-4 p-3 bg-white";
        newItem.innerHTML = `
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h6 class="fw-bold mb-0 text-primary">${sku}</h6>
                <small class="text-muted"><i class="bi bi-clock me-1"></i>${new Date().toLocaleTimeString()}</small>
            </div>
            <div class="d-flex align-items-center gap-3">
                <input type="number" class="form-control qty-input shadow-sm border-0 bg-light" value="1" min="1">
                <button class="btn btn-sm btn-light text-danger rounded-circle shadow-sm"
                    onclick="this.closest('.list-group-item').remove(); updateCounter();">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>`;
        list.prepend(newItem);
        updateCounter();
    }

    function updateCounter() {
        const count = document.querySelectorAll(".scanned-item").length;
        document.getElementById("itemCounter").innerText = `${count} sản phẩm`;
        if (count === 0)
            document.getElementById("noData").style.display = "block";
    }

    let currentMode = "INBOUND"; // Mặc định là nhập kho

    function switchMode(mode, element) {
        currentMode = mode;

        // 1. Cập nhật UI cho các nút Tab
        document
            .querySelectorAll("#opTab .nav-link")
            .forEach((btn) => btn.classList.remove("active"));
        element.classList.add("active");

        // 2. Thay đổi màu sắc chủ đạo của trang dựa trên nghiệp vụ
        const root = document.documentElement;
        const confirmBtn = document.querySelector(".card-footer .btn-lg");

        if (mode === "INBOUND") {
            root.style.setProperty("--success-color", "#22c55e");
            confirmBtn.style.background =
                "linear-gradient(135deg, #6366f1 0%, #a855f7 100%)";
            confirmBtn.innerText = "XÁC NHẬN NHẬP KHO";
        } else if (mode === "OUTBOUND") {
            root.style.setProperty("--success-color", "#ef4444"); // Chuyển viền card sang đỏ
            confirmBtn.style.background =
                "linear-gradient(135deg, #f43f5e 0%, #fb7185 100%)";
            confirmBtn.innerText = "XÁC NHẬN XUẤT KHO";
        } else if (mode === "TRANSFER") {
            root.style.setProperty("--success-color", "#f59e0b"); // Chuyển viền card sang vàng
            confirmBtn.style.background =
                "linear-gradient(135deg, #f59e0b 0%, #d97706 100%)";
            confirmBtn.innerText = "XÁC NHẬN ĐIỀU CHUYỂN";
        }

        // 3. Xóa danh sách cũ khi chuyển chế độ (tùy chọn)
        if(confirm('Chuyển chế độ sẽ xóa danh sách hiện tại, bạn đồng ý chứ?')) {
            document.getElementById('scannedList').innerHTML = '<div class="text-center py-5 opacity-25" id="noData"><i class="bi bi-box-seam display-1"></i><p class="mt-2">Chưa có dữ liệu quét</p></div>';
            updateCounter();
        }
    }
</script>
</body>
</html>
